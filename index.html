<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Enter to Boom!</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            color: white;
        }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            animation: pulse 1s infinite alternate;
            pointer-events: none;
        }

        #countdown {
            font-size: 18rem;
            text-shadow:
                0 0 15px #00f2ff,
                0 0 30px #00f2ff,
                0 0 60px #00f2ff;
            z-index: 10;
            transition: transform 0.1s;
        }

        .instruction {
            position: absolute;
            bottom: 50px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            opacity: 0.6;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.1;
            }
        }

        /* 숫자 바뀔 때 터지는 효과 */
        .hit {
            animation: hit-anim 0.2s ease-out;
        }

        @keyframes hit-anim {
            0% {
                transform: scale(0.8) rotate(-5deg);
                filter: brightness(3);
            }

            50% {
                transform: scale(1.3) rotate(5deg);
            }

            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .particle {
            position: absolute;
            background: #fff;
            box-shadow: 0 0 10px #00f2ff;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div id="countdown">65</div>
    <div class="instruction">PRESS ENTER TO GO DOWN</div>

    <script>
        const display = document.getElementById('countdown');
        let count = 65;
        let isFinished = false;

        function explosion() {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');

                const size = Math.random() * 8 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';

                const x = window.innerWidth / 2;
                const y = window.innerHeight / 2;

                const destX = (Math.random() - 0.5) * 800;
                const destY = (Math.random() - 0.5) * 800;

                p.style.left = x + 'px';
                p.style.top = y + 'px';

                document.body.appendChild(p);

                const anim = p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'ease-out'
                });

                anim.onfinish = () => p.remove();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isFinished) {
                count--;

                if (count >= 0) {
                    display.innerText = count;

                    // 애니메이션 리셋 및 실행
                    display.classList.remove('hit');
                    void display.offsetWidth;
                    display.classList.add('hit');

                    explosion();
                }

                if (count === 0) {
                    isFinished = true;
                    display.innerText = "DONE";
                    display.style.color = "#ff0055";
                    display.style.textShadow = "0 0 30px #ff0055, 0 0 60px #ff0055";
                    document.querySelector('.instruction').innerText = "MISSION COMPLETE";
                }
            }
        });
    </script>
</body>

</html>
