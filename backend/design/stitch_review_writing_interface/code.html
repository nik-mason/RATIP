<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                    "secondary": "#565e74",

                    "secondary-container": "#dae2fd",
                    "surface-bright": "#f7f9fb",
                    "on-tertiary-fixed-variant": "#703700",
                    "outline-variant": "#c7c4d7",

                    "error": "#ba1a1a",

                    "surface-tint": "#494bd6",

            "borderRadius": {
                    "DEFAULT": "0.25rem",

                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "stack-lg": "32px",
                    "gutter": "24px",
                    "container-max": "1200px",
                    "margin-mobile": "16px",
                    "stack-sm": "8px",
                    "stack-md": "16px",
                    "margin-desktop": "48px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "headline-lg": ["Manrope"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],

          },

      }

<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full border-b border-white/40 z-50 bg-white/70 backdrop-blur-xl flex items-center justify-between px-6 h-16">
<button class="active:scale-95 transition-transform duration-200 text-slate-500">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-manrope font-semibold text-slate-900 text-lg">Write Review</h1>
<button class="active:scale-95 transition-transform duration-200 text-indigo-600 font-manrope font-semibold">Post</button>
</header>
<!-- Content Canvas -->
<main class="flex-1 mt-16 pb-24 px-gutter max-w-lg mx-auto w-full">
<!-- Image Upload Placeholder -->
<section class="mt-stack-lg mb-stack-lg">
<div class="relative w-full aspect-video rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-stack-sm active:scale-[0.98] transition-transform duration-200 overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-cover bg-center" data-alt="vibrant abstract background with soft purple and blue gradients and subtle texture patterns" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCp_bq_iYJB5dAPTChpXDlFzu5oN8cLZtdEq7AWuWFMJgtP7gf0Dj8AOuTxWB9ihgF-6CmtDhpvcQ9wTvaccbbMsHTLYsBkkhqAz6hd_gZClBeOJiVU644FYnhBabelfkRGvA0QfjR8xytxbWAxHry_qEpaAH4cu_gO8rz7YAxp155hqmtTf1LvBS7jgXR2zDjYO-jaqi_WnbvFhcKUAoK36bJDe1ejLVk_16nCtJO7vv9NSK8c3YTrS5pmHd-IylPW9132ZtmgBmdN')"></div>
<div class="z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="add_a_photo">add_a_photo</span>
<span class="font-label-md text-label-md text-on-surface-variant mt-stack-sm">Add Photos</span>
</div>
</div>
</section>
<!-- Rating Widget -->
<section class="mb-stack-lg flex flex-col items-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">Rate your experience</h2>
<div class="flex gap-2">
<button class="active:scale-90 transition-all text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="active:scale-90 transition-all text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="active:scale-90 transition-all text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="active:scale-90 transition-all text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="active:scale-90 transition-all text-outline-variant">
<span class="material-symbols-outlined text-4xl" data-icon="star">star</span>
</button>
</div>
</section>
<!-- Review Text Input -->
<section class="mb-stack-lg relative">
<div class="glass-effect rounded-xl p-stack-md min-h-[300px] flex flex-col">
<textarea class="w-full flex-1 bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder:text-outline resize-none" placeholder="Tell us about the details..."></textarea>
<!-- Floating Toolbar Pillar -->
<div class="mt-stack-md flex items-center justify-center">
<div class="bg-white/90 backdrop-blur-md rounded-full shadow-sm border border-white/40 px-4 py-2 flex gap-6 items-center">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="format_bold">format_bold</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="format_italic">format_italic</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="format_list_bulleted">format_list_bulleted</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="attach_file">attach_file</span>
</button>
</div>
</div>
</div>
</section>
<!-- Primary Action -->
<div class="mt-stack-lg pb-stack-lg">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-headline-md text-headline-md active:scale-[0.98] transition-all duration-200">
                Save Record
            </button>
</div>
</main>
<!-- BottomNavBar (Icons Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-8 pb-safe bg-white/70 backdrop-blur-xl border-t border-white/20 shadow-xl shadow-indigo-900/5 rounded-t-2xl">
<button class="flex flex-col items-center justify-center text-slate-400 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
</button>
<button class="flex flex-col items-center justify-center text-indigo-600 scale-110 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="edit_note" style="font-variation-settings: 'FILL' 1;">edit_note</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</nav>
</body></html>
