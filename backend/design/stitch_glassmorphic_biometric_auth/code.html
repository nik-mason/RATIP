<style>
    .glass-effect {
      backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .background-blur {
      filter: blur(8px);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body-md text-on-background overflow-hidden h-screen w-full flex items-center justify-center">
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-white/70 dark:bg-slate-900/70 backdrop-blur-3xl shadow-sm border-b border-white/40 dark:border-slate-700/50">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-indigo-600 dark:text-indigo-400" data-icon="security">security</span>
<h1 class="text-lg font-bold text-slate-900 dark:text-white font-sans antialiased tracking-tight">Security</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 p-sm hover:bg-white/20 dark:hover:bg-slate-800/50 transition-colors rounded-full cursor-pointer" data-icon="settings">settings</span>
</div>
</header>
<main class="relative w-full h-full flex items-center justify-center p-margin">
<div class="absolute inset-0 z-0 background-blur overflow-hidden">
<div class="grid grid-cols-2 md:grid-cols-4 gap-lg p-margin opacity-60">
<div class="h-48 rounded-xl bg-surface-container shadow-sm border border-white/40 p-md flex flex-col justify-end">
<div class="h-4 w-24 bg-outline-variant rounded-full mb-sm"></div>
<div class="h-3 w-16 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="h-48 rounded-xl bg-surface-container shadow-sm border border-white/40 p-md flex flex-col justify-end">
<div class="h-4 w-24 bg-outline-variant rounded-full mb-sm"></div>
<div class="h-3 w-16 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="h-48 rounded-xl bg-surface-container shadow-sm border border-white/40 p-md flex flex-col justify-end">
<div class="h-4 w-24 bg-outline-variant rounded-full mb-sm"></div>
<div class="h-3 w-16 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="h-48 rounded-xl bg-surface-container shadow-sm border border-white/40 p-md flex flex-col justify-end">
<div class="h-4 w-24 bg-outline-variant rounded-full mb-sm"></div>
<div class="h-3 w-16 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="col-span-2 h-64 rounded-xl glass-effect p-lg flex flex-col gap-md">
<div class="h-8 w-1/3 bg-primary-fixed rounded-lg"></div>
<div class="h-4 w-full bg-outline-variant/30 rounded-full"></div>
<div class="h-4 w-full bg-outline-variant/30 rounded-full"></div>
<div class="h-4 w-3/4 bg-outline-variant/30 rounded-full"></div>
</div>
<div class="col-span-2 h-64 rounded-xl bg-primary-container p-lg flex flex-col justify-between overflow-hidden relative">
<div class="z-10">
<div class="h-6 w-32 bg-white/20 rounded-full mb-sm"></div>
<div class="h-10 w-48 bg-white/90 rounded-lg"></div>
</div>
<div class="absolute -right-8 -bottom-8 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
</div>
</div>
</div>
<div class="absolute inset-0 bg-black/5 z-10 backdrop-blur-[2px]"></div>
<div class="relative z-20 w-full max-w-sm glass-effect rounded-[28px] p-xl flex flex-col items-center text-center shadow-2xl animate-in fade-in zoom-in duration-300">
<div class="w-20 h-20 bg-primary-fixed flex items-center justify-center rounded-full mb-lg">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="face">face</span>
</div>
<h2 class="font-headline-md text-on-surface mb-sm">Face ID</h2>
<p class="font-body-md text-on-surface-variant px-md mb-2xl">
        Do you want to allow "App" to use Face ID?
      </p>
<div class="w-full flex flex-col gap-md">
<button class="w-full h-14 bg-primary-container text-on-primary font-label-md rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-md">
          Use Biometrics
        </button>
<button class="w-full h-14 bg-transparent text-primary font-label-md rounded-xl hover:bg-white/40 active:scale-95 transition-all">
          Cancel
        </button>
</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-3xl shadow-lg border-t border-white/50 dark:border-slate-700/50">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-indigo-500 transition-colors cursor-pointer group">

<span class="text-[11px] font-medium font-sans">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-indigo-600 dark:text-indigo-400 font-sans cursor-pointer">
<span class="material-symbols-outlined" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[11px] font-medium">Vault</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-indigo-500 transition-colors cursor-pointer group">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[11px] font-medium font-sans">Activity</span>
</div>

<span class="text-[11px] font-medium font-sans">Profile</span>
</div>
