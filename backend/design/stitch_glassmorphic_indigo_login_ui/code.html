<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-surface {
            backdrop-filter: blur(24px);
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .ethereal-gradient {
            background: radial-gradient(circle at 0% 0%, #e1e0ff 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #dde1ff 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #f8f9ff 0%, #f0f4ff 100%);
        }
        .floating-shadow {
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        .input-glass:focus-within {
            border-color: #6366F1;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-on-background bg-background min-h-screen flex flex-col">
<!-- Hero Background Layer -->
<div class="fixed inset-0 ethereal-gradient -z-10" data-alt="Smooth gradient flowing from deep navy to soft lavender with subtle grain texture and soft indigo highlights"></div>
<header class="fixed top-0 left-0 right-0 z-50">
<nav class="bg-white/45 dark:bg-slate-900/45 backdrop-blur-xl border-b border-white/50 dark:border-slate-800/50 shadow-[0_20px_40px_rgba(99,102,241,0.15)]">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-indigo-600 dark:text-indigo-400" data-icon="bubble_chart">bubble_chart</span>
<span class="text-2xl font-semibold bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent font-sans antialiased tracking-tight">Aura</span>
</div>
<div class="hidden md:flex gap-8">
<a class="text-slate-500 dark:text-slate-400 hover:bg-white/20 dark:hover:bg-slate-800/20 transition-all duration-300 font-label-md" href="#">Features</a>
<a class="text-slate-500 dark:text-slate-400 hover:bg-white/20 dark:hover:bg-slate-800/20 transition-all duration-300 font-label-md" href="#">About</a>
<a class="text-indigo-600 dark:text-indigo-400 font-bold font-label-md" href="#">Sign In</a>
</div>
</div>
</nav>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-24 md:py-32">
<div class="w-full max-w-md glass-surface rounded-[2rem] p-8 md:p-12 floating-shadow">
<div class="text-center mb-10">
<h1 class="font-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-sm text-on-surface-variant">Elevate your digital presence with Aura</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault()">
<div class="space-y-2">
<label class="font-label-sm text-on-surface-variant ml-1">Email address</label>
<div class="input-glass rounded-xl flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline mr-3" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-body-md text-on-surface placeholder-outline-variant" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-sm text-on-surface-variant">Password</label>
<a class="font-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="input-glass rounded-xl flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline mr-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-body-md text-on-surface placeholder-outline-variant" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-outline cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-xl font-label-md floating-shadow hover:brightness-110 active:scale-[0.98] transition-all duration-300">
                    Sign In
                </button>
</form>
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/50"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 text-on-surface-variant font-label-sm glass-surface rounded-full py-1">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 rounded-xl glass-surface hover:bg-white/60 transition-colors font-label-md text-on-surface-variant">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google G icon with four colors on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQpfT2DXuS1WQ31WarItQu4aoMoBartsd7PPjGHw8C_brHRTBAW8PD3uTG-0H5LaGDG3mSiaiBGy5s8nRhpWxk4uWSU3U1EKj-JugrpL1_bisWNfb7FPkRj7op4SJUEjvFaZbss5dPO1nsb12w85oB37YUhzVLSwdsuG5RgQEpAPyxO4MkWD7jxr0dD_FtNdOBMBSsEW-yCUkUTdcH5IQnES_I77KnOVXGv9ITD0eIhUi6yxUVC-kSZ2XvgU2YsnAcafYB9fEBS_On"/>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl glass-surface hover:bg-white/60 transition-colors font-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
                    Apple
                </button>
</div>
<p class="text-center mt-10 font-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-label-md hover:underline" href="#">Join Aura</a>
</p>
</div>
</main>
<footer class="mt-auto py-12 flex flex-col md:flex-row items-center justify-center gap-8 w-full">
<div class="flex gap-8 order-2 md:order-1">
<a class="text-slate-400 dark:text-slate-500 hover:text-indigo-500 transition-colors font-label-md tracking-wide" href="#">Privacy</a>
<a class="text-slate-400 dark:text-slate-500 hover:text-indigo-500 transition-colors font-label-md tracking-wide" href="#">Terms</a>
<a class="text-slate-400 dark:text-slate-500 hover:text-indigo-500 transition-colors font-label-md tracking-wide" href="#">Support</a>
</div>
<p class="text-slate-400 dark:text-slate-500 font-label-md tracking-wide order-1 md:order-2">
            © 2024 Aura Design Systems. All rights reserved.
        </p>
</footer>
</body></html>
