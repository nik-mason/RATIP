<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ratip: Precision Journey">

  <!-- Kakao Map SDK -->
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3862fe77936849cf63911211b069af51&autoload=false"></script>
  <script>
    console.log("Attempting to load Kakao SDK...");
    function checkKakao() {
      if (window.kakao && window.kakao.maps) {
        console.log("Kakao SDK confirmed in window");
        return true;
      }
      return false;
    }
  </script>

  <style>
    body {
      background-color: #F8F9FF;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader {
      border: 4px solid #E1E0FF;
      border-top: 4px solid #4648D4;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #4648D4;
      font-weight: bold;
    }
  </style>
  
  <script src="flutter.js" defer></script>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="loader"></div>
    <div class="loading-text">Loading Ratip...</div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: '{{flutter_service_worker_version}}',
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
