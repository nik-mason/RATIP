<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ratip: Precision Journey">

  <title>ratip</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #F8F9FF;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
  
  <!-- Kakao Map SDK (Web JavaScript Key) -->
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3862fe77936849cf63911211b069af51&autoload=false"></script>

  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="loading" style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #5F6368;">
    <div style="text-align: center;">
      <div style="margin-bottom: 16px; font-size: 24px;">Ratip</div>
      <div>Loading...</div>
    </div>
  </div>
  <script>
    console.log("[Ratip] Window load event triggered");
    window.addEventListener('load', function(ev) {
      console.log("[Ratip] Initializing Flutter loader...");
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          console.log("[Ratip] Entrypoint loaded, initializing engine...");
          engineInitializer.initializeEngine().then(function(appRunner) {
            console.log("[Ratip] Engine initialized, running app...");
            // Remove loading indicator when app starts
            var loading = document.getElementById('loading');
            if (loading) loading.remove();
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
