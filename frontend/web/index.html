<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ratip: Precision Journey">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ratip">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ratip</title>
  <link rel="manifest" href="manifest.json">

  <script src="flutter.js" defer></script>
  
  <style>
    body {
      background-color: #F8F9FF; /* Ratip background color */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader {
      border: 4px solid #E1E0FF;
      border-top: 4px solid #4648D4; /* Ratip primary color */
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #4648D4;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="loader"></div>
    <div class="loading-text">Loading Ratip...</div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // Revert to loadEntrypoint as it is most stable across 3.x despite warnings
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: '{{flutter_service_worker_version}}',
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            // Remove loading indicator when Flutter is ready
            document.getElementById('loading-indicator').remove();
            appRunner.runApp();
          }).catch(function(error) {
            console.error("Flutter initialization failed:", error);
            document.querySelector('.loading-text').innerText = "Error loading app.";
          });
        }
      });
    });
  </script>
</body>
</html>
