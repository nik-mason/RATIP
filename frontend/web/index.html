<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ratip: Precision Journey">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ratip">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ratip</title>
  <link rel="manifest" href="manifest.json" crossorigin="use-credentials">

  <style>
    body {
      background-color: #F8F9FF;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader {
      border: 4px solid #E1E0FF;
      border-top: 4px solid #4648D4;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #4648D4;
      font-weight: bold;
    }
  </style>
  
  <!-- Kakao Map SDK -->
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3862fe77936849cf63911211b069af51&libraries=services,clusterer,drawing"></script>
  
  <!-- flutter.js를 수동으로 로드 -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="loader"></div>
    <div class="loading-text">Loading Ratip...</div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // 빌드 도구가 설정을 주입하지 못할 경우를 대비해 수동으로 설정
      if (!window._flutter) {
        window._flutter = {};
      }
      if (!window._flutter.buildConfig) {
        window._flutter.buildConfig = {
          "engineRevision": "36335019a8eab588c3c2ea783c618d90505be233",
          "buildNumber": "1.0.0",
          "mainDartFile": "main.dart"
        };
      }

      // Flutter 초기화 시작
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: '{{flutter_service_worker_version}}',
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
