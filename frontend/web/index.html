<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ratip: Precision Journey">

  <title>ratip</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #F8F9FF;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      color: #5F6368;
      transition: opacity 0.5s;
    }
    
    /* Search Result Pulse Animation */
    @keyframes marker-pulse {
      0% { transform: scale(0.8); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.8; }
    }
    .search-pulse {
      width: 40px;
      height: 40px;
      background-color: rgba(66, 133, 244, 0.4);
      border: 3px solid #4285F4;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(66, 133, 244, 0.6);
      animation: marker-pulse 1s infinite ease-in-out;
      pointer-events: none;
    }
  </style>

  <!-- Kakao Map SDK -->
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3862fe77936849cf63911211b069af51&autoload=false&libraries=services"></script>

  <!-- This script adds the bootstrap script tag dynamically -->
  <script src="flutter_bootstrap.js" async></script>
</head>
<body>
  <div id="loading">
    <div style="text-align: center;">
      <div style="margin-bottom: 16px; font-size: 24px; font-weight: bold;">Ratip</div>
      <div id="status">Loading engine...</div>
    </div>
  </div>

  <script>
    // Listen for the first frame to hide the loading screen
    // Note: In some versions, you might need to trigger this from Dart side.
    // We'll also add a fallback timeout.
    window.addEventListener('flutter-first-frame', function() {
      console.log("[Ratip] First frame rendered, hiding loading screen.");
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(function() { loading.remove(); }, 500);
      }
    });

    // Fallback: If it takes too long, just check if flutter is running
    setTimeout(function() {
      var loading = document.getElementById('loading');
      if (loading) {
        document.getElementById('status').innerText = "Initializing...";
      }
    }, 5000);
  </script>
</body>
</html>
