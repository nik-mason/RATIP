<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ratip: Precision Journey">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ratip">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ratip</title>
  <link rel="manifest" href="manifest.json">

  <!-- 이 부분이 중요합니다: Flutter 빌드 도구가 필요한 설정을 주입합니다 -->
  {{flutter_head_setup}}

  <style>
    body {
      background-color: #F8F9FF;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loader {
      border: 4px solid #E1E0FF;
      border-top: 4px solid #4648D4;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #4648D4;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="loader"></div>
    <div class="loading-text">Loading Ratip...</div>
  </div>

  <!-- Flutter 빌드 도구가 여기에 flutter.js 및 초기화 스크립트를 주입합니다 -->
  {{flutter_body_setup}}

  <script>
    window.addEventListener('load', function(ev) {
      // 최신 방식: _flutter.loader.load()를 인자 없이 호출하면 
      // 빌드 도구가 주입한 buildConfig를 자동으로 사용합니다.
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
